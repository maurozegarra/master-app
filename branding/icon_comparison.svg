    </g>
  </g>

  <!-- Divisor -->
  <line x1="1024" y1="0" x2="1024" y2="1024" stroke="#333" stroke-width="2"/>

  <!-- Lado derecho: nuestro hexágono con M estilo Wallpoet (paths rellenos) -->
  <rect x="1024" y="0" width="1024" height="1024" fill="#000000"/>
  <!-- Hexagon edges in white -->
  <g transform="translate(1024,0)" fill="#FFFFFF" fill-rule="evenodd">
    <!-- Top-left edge with notch where M diagonal meets hexagon -->
    <path d="M512,132 L234,292 L311,336 L512,220 Z"/>
    <!-- Top-right edge with notch where M diagonal meets hexagon -->
    <path d="M512,132 L790,292 L713,336 L512,220 Z"/>
    <!-- Bottom-left diagonal with notch separating M leg from hexagon -->
    <path d="M234,732 L512,892 L512,804 L311,688 Z"/>
    <!-- Bottom-right diagonal with notch separating M leg from hexagon -->
    <path d="M790,732 L512,892 L512,804 L713,688 Z"/>
  </g>
  <!-- M in red -->
  <g transform="translate(1024,0)" fill="#E63946" fill-rule="evenodd">
    <!-- M left half: leg + diagonal (Wallpoet style, with V-notch gap) -->
    <path d="M182,322 L252,322 L500,450 L500,550 L259,429 L259,702 L182,702 Z"/>
    <!-- M right half: leg + diagonal (Wallpoet style, with V-notch gap) -->
    <path d="M842,322 L773,322 L524,450 L524,550 L765,429 L765,702 L842,702 Z"/>
  </g>

  <!-- Reference lines on top of everything -->
  <line x1="0" y1="132" x2="2048" y2="132" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="8,4"/>
  <line x1="0" y1="892" x2="2048" y2="892" stroke="#FFFFFF" stroke-width="1" stroke-dasharray="8,4"/>
</svg>
