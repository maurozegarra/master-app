<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1024" width="2048" height="1024">
  <!-- Lado izquierdo: AppBlock original -->
  <rect x="0" y="0" width="1024" height="1024" fill="#000000"/>
  <g transform="translate(-119.5,-119.5) scale(13.796)">
    <g transform="scale(0.6885) translate(26.46,26.46)">
      <path fill="#ff2f96ff" d="M39.999,27.5238L5.7101,14.1885L11.3312,28.125L39.999,40.0262L68.6668,28.125L74.2879,14.1885L39.999,27.5238Z"/>
      <path fill="#ff2577cb" d="M65.1342,10.1057L39.9989,0L14.8636,10.1057L22.1109,15.1368L39.9989,8.5664L57.8869,15.1368L65.1342,10.1057Z"/>
      <path fill="#ff2f96ff" d="M40.0016,51.1075L18.2926,41.3521L21.8933,51.7077L39.9992,59.6882L58.1031,51.7086L61.7118,41.6879L40.0016,51.1075Z"/>
      <path fill="#ff2f96ff" d="M39.9854,72.2338L28.5913,66.7446L25.6968,73.9211L39.9851,80L54.3015,73.9213L51.407,66.7449L39.9854,72.2338Z"/>
